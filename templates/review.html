<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Form</title>
    <style>
        body {
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #ffecd2 0%, #fcb69f 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            /* Form container styling */
            .form-container {
                background: #ffffff;
                padding: 20px 30px;
                border-radius: 8px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                max-width: 400px;
                width: 100%;
            }

            /* Input field styling */
            form input[type="email"] {
                width: calc(100% - 40px);
                padding: 10px 20px;
                margin-bottom: 20px;
                border: 2px solid #ddd;
                border-radius: 4px;
                font-size: 16px;
                transition: border-color 0.3s;
            }

            /* Input focus effect */
            form input[type="email"]:focus {
                border-color: #ff7b54;
                outline: none;
            }

            /* Button styling */
            form button {
                width: 100%;
                padding: 10px 0;
                background-color: #ff7b54;
                border: none;
                border-radius: 4px;
                color: white;
                font-size: 18px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            /* Button hover effect */
            form button:hover {
                background-color: #ff6b3b;
            }

    </style>
</head>
<body>
    <a href="/indexs">Review</a>
    <div class="form-container">
        <form action="/ssend-email" method="post">
            <input type="email" name="email" placeholder="Email">
            <button type="submit">Send Review</button>
        </form>
    </div>
</body>
</html>
