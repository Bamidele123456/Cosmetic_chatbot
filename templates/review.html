<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Review | Cosmetic Spa</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --surface: #ffffff;
            --primary: #e82959; /* Spa pink */
            --primary-hover: #c41e48;
            --text-main: #2b2b2b;
            --text-muted: #7a7a7a;
            --border: #e0e0e0;
            --input-bg: #fdfdfd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
        }

        .back-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Form Card */
        .form-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .card-header p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Input Group */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
        }

        form input[type="email"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        form input[type="email"]::placeholder {
            color: #b0b0b0;
        }

        form input[type="email"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(232, 41, 89, 0.1);
            outline: none;
        }

        /* Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/indexs" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Inbox
        </a>
    </div>

    <div class="form-card">
        <div class="card-header">
            <h2>Request a Review</h2>
            <p>Enter the patient's email to manually trigger a review request.</p>
        </div>

        <form action="/review-email" method="post">
            <div class="input-group">
                <label for="email">Patient Email Address</label>
                <input type="email" id="email" name="email" placeholder="e.g., jane@example.com" required>
            </div>
            <button type="submit" class="btn-submit">Send Review Email</button>
        </form>
    </div>

</body>
</html>
