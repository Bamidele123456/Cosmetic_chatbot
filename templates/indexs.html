   <script>
   const fullHtmlPage = document.documentElement.outerHTML;
    const socket = io();

    // Function to update data
    const updateData = () => {
        // Fetch data from server
        fetch('/index', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            // Update the HTML content with the fetched data
            const container = document.getElementsByClassName('home-container02')[0];
            container.innerHTML = ''; // Clear existing content

            // Populate the HTML tags with the first item's data
            if (data.length > 0) {
                populateAdditionalInfo(data[0]);
            }

            // Loop through the data array
            data.forEach(item => {
                // Create message container
                const messageContainer = document.createElement('div');
                messageContainer.classList.add('message-container');

                function fadeDiv() {
                    // Toggle the 'faded' class on the div to trigger the fading effect
                    messageContainer.classList.toggle('faded');

                    // Optionally, you can remove the 'faded' class after the fading effect ends to reset the div
                    setTimeout(() => {
                        messageContainer.classList.remove('faded');
                    }, 500); // Duration matches the CSS transition duration
                }

                // Add an event listener to the message container for the click event
                messageContainer.addEventListener('click', fadeDiv);

                // Create <h1> element for phone number
                const phoneNumberElement = document.createElement('h1');
                phoneNumberElement.classList.add('home-text');
                phoneNumberElement.textContent = item.number;
                phoneNumberElement.classList.add('bordered-element');

                // Create <span> element for text
                const textElement = document.createElement('span');
                textElement.classList.add('home-text01');
                const message = item.messages;
                const truncatedText = message && message.length > 17 ? message.substring(0, 17) + '...' : message || '';
                textElement.textContent = truncatedText;

                // Append elements to message container
                messageContainer.appendChild(phoneNumberElement);
                messageContainer.appendChild(textElement);

                // Add event listener to message container
                messageContainer.addEventListener('click', () => {
                    // Populate additional information
                    populateAdditionalInfo(item);
                });

                // Append message container to main container
                container.appendChild(messageContainer);
            });
        })
        .catch(error => console.error('Error fetching data:', error));
    };

    // Function to populate additional information
    const populateAdditionalInfo = (item) => {
        document.getElementsByClassName('home-text06')[0].textContent = item.timestamp;
        document.getElementById('text').textContent = item.messages;
        const fullName = item.first + ' ' + item.last;
        document.getElementsByClassName('home-text12')[0].textContent = fullName;
        document.getElementsByClassName('home-text14')[0].textContent = item.email;
        document.getElementsByClassName('home-text16')[0].textContent = item.number;
        curentmessage = item.messages
        currentEmail = item.email;
        const updateDatas = {
          email: currentEmail,
          message: item.messages
      };
        fetch('/get_checkbox_state', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(updateDatas)
    })
    .then(response => response.json())
    .then(data => {
        if (data) {
            // Update the checkboxes with the fetched data
            console.log(data.appointment)
            console.log(data.review)
            document.getElementById('appointment-checkbox').checked = data.appointment;
            document.getElementById('review-checkbox').checked = data.review;
            console.log('Checkbox state fetched successfully');
        } else {
            console.error('Failed to fetch checkbox state');
        }
    })
    };
    const appointmentCheckbox = document.getElementById('appointment-checkbox');
    const reviewCheckbox = document.getElementById('review-checkbox');

    appointmentCheckbox.addEventListener('change', () => {
        updateCheckboxState(currentEmail,curentmessage, appointmentCheckbox.checked, reviewCheckbox.checked);
    });

    reviewCheckbox.addEventListener('change', () => {
        updateCheckboxState(currentEmail,curentmessage, appointmentCheckbox.checked, reviewCheckbox.checked);
    });
    const updateCheckboxState = (email, message, appointmentChecked, reviewChecked) => {
      const updateData = {
          email: email,
          appointment: appointmentChecked,
          review: reviewChecked,
          message: message
      };

      // Send updateData to server using fetch API
      fetch('/update_checkbox_state', {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json'
          },
          body: JSON.stringify(updateData)
      })
      .then(() => {
      })
      .catch(error => console.error('Error updating checkbox state:', error));
  };

    const sendEmailButton = document.getElementById('send-email-button');
    sendEmailButton.onclick = () => {
        sendEmail(currentEmail);
    };

    const sendEmail = (email) => {
        fetch('/send-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email })
        })
        .then(response => response.json())
        .then(data => {
            console.log('Email sent successfully:', data);
        })
        .catch(error => console.error('Error sending email:', error));
    };

    // Initial call to update data
    window.onload = () => {
        updateData();
        setTimeout(() => {
            document.body.style.opacity = 1;
        }, 4000);
        document.body.style.opacity = 1;
    };

    socket.on('data_update', () => {
        updateData(); // Fetch data from the '/index' route
    });
    </script>
