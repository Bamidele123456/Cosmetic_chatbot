<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cosmetic Spa | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/indexs.css') }}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.4.1/socket.io.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Inbox</h2>
            </div>
            <div id="message-list" class="message-list">
                </div>
        </aside>

        <main class="main-viewer">
            <div class="viewer-header">
                <span id="timestamp-badge" class="badge">Select a conversation</span>
                <div class="toggles">
                    <label class="toggle-switch">
                        <input id="appointment-checkbox" type="checkbox">
                        <span class="slider"></span>
                        <span class="toggle-label">Appointment</span>
                    </label>
                    <label class="toggle-switch">
                        <input id="review-checkbox" type="checkbox">
                        <span class="slider"></span>
                        <span class="toggle-label">Review Sent</span>
                    </label>
                </div>
            </div>
            <div class="viewer-body">
                <div class="chat-bubble">
                    <p id="main-message-text">Awaiting selection...</p>
                </div>
            </div>
        </main>

        <aside class="profile-panel">
            <div class="avatar" id="avatar-initials">--</div>
            <h3 id="profile-name">Patient Name</h3>
            <p id="profile-email" class="text-muted">email@example.com</p>
            <p id="profile-phone" class="text-muted">Phone Number</p>

            <div class="actions">
                <button id="send-email-button" class="btn-primary">Send Review Email</button>
                <a href="/review" class="btn-outline">View Review Page</a>
            </div>
        </aside>
    </div>

    <script>
        const socket = io();
        let currentPatient = { email: '', name: '', message: '' };

        const updateData = async () => {
            try {
                const response = await fetch('/index', { method: 'POST', headers: { 'Content-Type': 'application/json' }});
                const data = await response.json();

                const list = document.getElementById('message-list');
                list.innerHTML = '';

                if (data.length > 0) {
                    data.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'list-item';
                        div.innerHTML = `
                            <strong>${item.number}</strong>
                            <p>${item.messages ? item.messages.substring(0, 25) + '...' : 'No message'}</p>
                        `;
                        div.onclick = () => loadPatientDetails(item);
                        list.appendChild(div);

                        // Auto-load the first item
                        if(index === 0 && !currentPatient.email) loadPatientDetails(item);
                    });
                }
            } catch (error) {
                console.error('Failed to fetch data:', error);
            }
        };

        const loadPatientDetails = async (item) => {
            currentPatient = {
                email: item.email,
                name: `${item.first} ${item.last}`,
                message: item.messages
            };

            // Update UI
            document.getElementById('timestamp-badge').textContent = item.timestamp;
            document.getElementById('main-message-text').textContent = item.messages;
            document.getElementById('profile-name').textContent = currentPatient.name;
            document.getElementById('profile-email').textContent = item.email;
            document.getElementById('profile-phone').textContent = item.number;
            document.getElementById('avatar-initials').textContent = item.first.charAt(0) + item.last.charAt(0);

            // Fetch Checkbox States
            const response = await fetch('/get_checkbox_state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentPatient.email, message: currentPatient.message })
            });
            const state = await response.json();

            document.getElementById('appointment-checkbox').checked = state.appointment || false;
            document.getElementById('review-checkbox').checked = state.review || false;
        };

        const syncCheckboxes = () => {
            fetch('/update_checkbox_state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: currentPatient.email,
                    message: currentPatient.message,
                    appointment: document.getElementById('appointment-checkbox').checked,
                    review: document.getElementById('review-checkbox').checked
                })
            });
        };

        // Event Listeners
        document.getElementById('appointment-checkbox').addEventListener('change', syncCheckboxes);
        document.getElementById('review-checkbox').addEventListener('change', syncCheckboxes);

        document.getElementById('send-email-button').onclick = () => {
            if(!currentPatient.email) return alert('No patient selected');
            fetch('/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentPatient.email, fullName: currentPatient.name })
            })
            .then(res => res.json())
            .then(data => alert('Email process triggered!'));
        };

        // Initialization
        window.onload = updateData;
        socket.on('data_update', updateData);
    </script>
</body>
</html>
